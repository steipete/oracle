<!doctype html>
<html lang="en" data-provider="chatgpt" data-requirement="chatgpt-pro-success">
  <body>
    <main aria-label="ChatGPT captured model picker">
      <section data-requirement="same-session-verification-before-prompt">
        <button data-oracle-role="chatgpt-model-option" aria-checked="false">GPT-5.2 Instant</button>
        <button data-oracle-role="chatgpt-model-option" aria-checked="true">GPT-5.5 Pro</button>
      </section>
      <section data-requirement="highest-visible-effort">
        <button data-oracle-role="chatgpt-effort-option" aria-selected="false">Standard</button>
        <button data-oracle-role="chatgpt-effort-option" aria-selected="false">Pro Extended</button>
        <button data-oracle-role="chatgpt-effort-option" aria-selected="true">Heavy</button>
      </section>
    </main>
  </body>
</html>
